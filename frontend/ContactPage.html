<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Appointment Online</title>

    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        #headerMainDiv {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: black;
            padding: 2vw;
            /* gap: 100px; */
        }

        #CartBtn,
        #MainLogo {
            width: 3vw;
            cursor: pointer;
        }

        #searchInput {
            width: 45vw;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }

        .Plogin {
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }

        .Plogin:hover {
            color: pink;
        }

        #formMainDIv {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 60vh;
            /* border: 1px solid black; */
        }

        #TwoFromDiv {
            border: 1px solid black;
            width: 40vw;
            height: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 10px;
            border-radius: 10px;
            /* background-color: rgba(255, 255, 255, 0.505); */
            background-color: rgba(255, 255, 255, 0.363);
            padding: 10px;

        }

        #TwoFromDiv:hover {
            box-shadow: 0px 0px 11px 1px
        }

        .inputText {
            width: 15vw;
            padding: 6px;
            border-radius: 5px;
            border: 1px solid black;
            background-color: rgba(0, 0, 0, 0.153);

        }

        .Name-P {
            font-size: 1.6vw;
            color: white;
        }

        #section1 {
            background-image: url(https://as1.ftcdn.net/v2/jpg/02/71/58/16/1000_F_271581697_8wjthz94dO3v9BKcf8f53qsKrEv8ChMB.jpg);
            background-size: cover;

        }

        ::placeholder {
            color: rgba(255, 255, 255, 0.658);
        }

        input {
            color: white;
        }

        #btn {
            padding: 5px;
            width: 7vw;
            border-radius: 3px;
            border: none;
            box-shadow: 0px 0px 1px 1px;
            cursor: pointer;
        }

        #btn:hover {
            box-shadow: 0px 0px 4px 1px;
            background-color: rgba(255, 192, 203, 0.826);
            color: white;
        }

        #d-img {

            display: flex;
            padding: 20px;
            background-color: #00000056;
            /* margin-top: 10px; */
        }

        #main-li {
            display: flex;
            justify-content: center;
            width: 100%;
            gap: 4vw;
            font-size: 1.5vw;
            gap: 16.6vw;
        }

        .li-end {
            display: flex;
            flex-direction: column;
        }

        li:hover {
            color: pink;
            border-bottom: 2px solid pink;
        }

        a {
            text-decoration: none;
            color: black;
        }

        @media only screen and (max-width: 768px) {
            /* #headerMainDiv {
            width: 100%;
        } */

            #MainLogo {
                width: 10vw;
                max-width: 10vw;
                height: auto;
                cursor: pointer;
            }

            #mainDivCard {
                display: flex;
                justify-content: center;

            }

            #CardDiv {
                display: flex;
                flex-direction: column;
                border: 1px solid pink;
                width: 18vh;
                margin-left: 15px;
                padding: 12px;
                border-radius: 4px;
                margin-bottom: 10px;
            }

            #ProductImage {
                height: 15vh;
                width: auto;
                cursor: pointer;
            }

            #titleP {
                font-size: 4vw;
                flex-wrap: wrap;
                padding: 8px;
            }

            #PriceP {
                font-size: 4vw;
                flex-wrap: wrap;
                padding: 8px;
            }

            #TwoFromDiv {
                border: 1px solid black;
                width: 95%;
                height: auto;
                display: flex;
                justify-content: center;
                align-items: center;
                flex-direction: column;
                gap: 10px;
                border-radius: 10px;
                /* background-color: rgba(255, 255, 255, 0.505); */
                background-color: rgba(255, 255, 255, 0.363);
                padding: 10px;
            }

            .inputText {
                width: 100%;
                padding: 6px;
                border-radius: 5px;
                border: 1px solid black;
                background-color: rgba(0, 0, 0, 0.153);
            }

            #btn {
                padding: 5px;
                width: 20vw;
                border-radius: 3px;
                border: none;
                box-shadow: 0px 0px 1px 1px;
                cursor: pointer;
            }

            .Name-P {
                font-size: 4vw;
                color: white;

            }

            .li-end {
                display: flex;
                flex-direction: column;
                font-size: 3vw;
            }
        }

        ::placeholder {
            color: black;
        }
    </style>
</head>

<body>

    <header>
        <div id="headerMainDiv">

            <a href="./index.html" ?><img id="MainLogo" src="https://cdn-icons-png.freepik.com/512/5278/5278590.png">
            </a>

            <input id="searchInput" type="text" placeholder="Search">

            <div>
                <p class="Plogin">Login / Sign up</p>
                <p class="Plogin">My Account</p>
            </div>

            <img id="CartBtn"
                src="https://icon-library.com/images/white-shopping-cart-icon/white-shopping-cart-icon-2.jpg">

        </div>
    </header>
    <section id="section1">
        <form>
            <div id="formMainDIv">
                <div id="TwoFromDiv">
                    <div>
                        <p class="Name-P">Name</p>
                        <input class="inputText" id="fullName" type="text" placeholder="Name">
                    </div>
                    <div>
                        <p class="Name-P">Phone No.</p>
                        <input class="inputText" type="number" id="mobileNumber" placeholder="Phone Number">
                    </div>
                    <div>
                        <p class="Name-P">Email</p>
                        <input class="inputText" type="email" id="emailId" placeholder="Email">
                    </div>
                    <button id="btn">Submit</button>
                </div>
            </div>
        </form>
    </section>
    <footer>
        <div id="d-img">
            <div id="main-li">
                <div>
                    <ul>
                        <b>
                            <li class="li-end">SHOP</li>
                        </b>
                        <a href="./allProduct.html">
                            <li class="li-end">All Jewelry</li>
                        </a>
                        <li class="li-end">Rings</li>
                        <li class="li-end">Necklaces</li>
                        <li class="li-end">New Arrivals</li>
                    </ul>
                </div>
                <div>
                    <ul>
                        <b>
                            <li class="li-end">COMPANY</li>
                        </b>
                        <a href="./aboutPage.html">
                            <li class="li-end">About Us</li>
                        </a>
                        <a href="./ContactPage.html">
                            <li class="li-end">Contact</li>
                        </a>
                        <li class="li-end">FAQ</li>
                        <li class="li-end">Shipping Info</li>
                    </ul>
                </div>
                <div>
                    <ul>
                        <b>
                            <li class="li-end">LEGAL</li>
                        </b>
                        <li class="li-end">Terms of Service</li>
                        <li class="li-end">Privacy</li>
                        <li class="li-end">Refund Policy</li>
                        <li class="li-end">Shipping Policy</li>
                    </ul>
                </div>
            </div>
        </div>
    </footer>
    <script>
        let fullName = document.getElementById("fullName");
        let mobileNumber = document.getElementById("mobileNumber");
        let emailId = document.getElementById("emailId");
        let submitBtn = document.getElementById("btn");


        submitBtn.addEventListener("click", async (e) => {
            e.preventDefault();
            if (fullName.value == "" || mobileNumber.value == "" || emailId.value == "") {
                alert("Fill In the blank")
                return;
            }
            try {
                const data = {
                    FullName: fullName.value,
                    mobileNumber: mobileNumber.value,
                    email: emailId.value
                }
                //http://localhost:8080/newClient
                //https://appointment-booking-z0zg.onrender.com/newClient
                let response = await fetch("http://localhost:8080/newClient", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                });
                let bookingDone = await response.json();
                alert("✅Appointment Booked Successfully ✅" + fullName.value);
                console.log("Booking Done");
                setTimeout(() => {
                    location.reload();
                }, 100);
            }
            catch (err) {
                console.log(err);
                alert("❌ Error aaya");
                // alert(err);
            }
        })
    </script>
</body>

</html>
