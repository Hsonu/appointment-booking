<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        /* Layout */
        #main {
            display: flex;
        }

        /* Sidebar */
        #sidebar {
            width: 220px;
            height: 100vh;
            background: #222d32;
            color: white;
        }

        #sidebar h2 {
            padding: 15px;
            background: #1a2226;
        }

        #sidebar ul {
            list-style: none;
        }

        #sidebar ul li {
            padding: 12px 15px;
            border-bottom: 1px solid #2c3b41;
            cursor: pointer;
        }

        #sidebar ul li:hover {
            background: #1e282c;
        }

        /* Top Navbar */
        #topbar {
            height: 50px;
            background: #3c8dbc;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        /* Content */
        #content {
            flex: 1;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .card {
            padding: 20px;
            color: white;
            border-radius: 5px;
        }

        .blue {
            background: #00c0ef;
        }

        .green {
            background: #00a65a;
        }

        .orange {
            background: #f39c12;
        }

        .red {
            background: #dd4b39;
        }

        .card h1 {
            font-size: 22px;
        }

        .card p {
            margin-top: 10px;
        }

        #Dashboard {
            text-decoration: none;
            color: #fff;
        }

        #div1 {
            padding: 20px;
        }

        #div1 button {
            padding: 10px 18px;
            margin-right: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            color: white;
            transition: 0.3s;
        }

        #Status,
        #orderText {
            text-decoration: none;
            color: #fff;
        }

        .add {
            background: #00a65a;
        }

        .add:hover {
            background: #008d4c;
        }

        .edit {
            background: #f39c12;
        }

        .edit:hover {
            background: #d68910;
        }

        .update {
            background: #3c8dbc;
        }

        .update:hover {
            background: #2e6da4;
        }
    </style>
</head>

<body>
    <div id="main">
        <!-- Sidebar -->
        <div id="sidebar">
            <h2>Admin Panel</h2>
            <ul>
                <a id="Dashboard" href="../Dashboard.html">
                    <li>Dashboard</li>
                </a>
                <a id="orderText" href="./Order.html">
                    <li>Product</li>
                </a>
                <a id="Status" href="./status.html">
                    <li>Status</li>
                </a>
            </ul>
        </div>
        <div id="div1">
            <a href="./addProduct.html"> <button class="add">Add Product</button></a>
            <a href="./EditProduct.html"> <button class="edit">Update Product</button></a>
            <!-- <button class="update">Update Product</button> -->
        </div>
    </div>
</body>

</html>
