<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        /* Layout */
        #main {
            display: flex;
        }

        /* Sidebar */
        #sidebar {
            width: 220px;
            height: 100vh;
            background: #222d32;
            color: white;
        }

        #sidebar h2 {
            padding: 15px;
            background: #1a2226;
        }

        #sidebar ul {
            list-style: none;
        }

        #sidebar ul li {
            padding: 12px 15px;
            border-bottom: 1px solid #2c3b41;
            cursor: pointer;
        }

        #sidebar ul li:hover {
            background: #1e282c;
        }

        /* Top Navbar */
        #topbar {
            height: 50px;
            background: #3c8dbc;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        /* Content */
        #content {
            flex: 1;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .card {
            padding: 20px;
            color: white;
            border-radius: 5px;
        }

        .blue {
            background: #00c0ef;
        }

        .green {
            background: #00a65a;
        }

        .orange {
            background: #f39c12;
        }

        .red {
            background: #dd4b39;
        }

        .card h1 {
            font-size: 22px;
        }

        .card p {
            margin-top: 10px;
        }

        .atag {
            text-decoration: none;
            color: #fff;
        }
    </style>

</head>

<body>

    <div id="main">

        <!-- Sidebar -->
        <div id="sidebar">
            <h2>Admin Panel</h2>
            <ul>
                <a class="atag" href="./Dashboard.html">
                    <li>Dashboard</li>
                </a>
                <a class="atag" href="./order/Order.html">
                    <li>Product</li>
                </a>
                <a class="atag" href="./order/status.html">
                    <li>Status</li>
                </a>
            </ul>
        </div>
        <!-- Right Side -->
        <div id="content">

            <!-- Top Navbar -->
            <div id="topbar">
                <div>Dashboard</div>
                <div>Admin</div>
            </div>

            <!-- Cards -->
            <div class="cards">
                <div class="card blue">
                    <h1>1,410</h1>
                    <p>Messages</p>
                </div>

                <div class="card green">
                    <h1>410</h1>
                    <p>Bookmarks</p>
                </div>

                <div class="card orange">
                    <h1>13,648</h1>
                    <p>Uploads</p>
                </div>

                <div class="card red">
                    <h1>93,139</h1>
                    <p>Likes</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
